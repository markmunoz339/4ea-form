  .empty-msg { text-align: center; color: #aaa; padding: 30px; font-size: 13px; }

let currentRec = null;
let rowCount = 0;

function today() {
  const d = new Date();
  return String(d.getMonth()+1).padStart(2,'0') + '/' +
         String(d.getDate()).padStart(2,'0') + '/' + d.getFullYear();
}

function lookupASM(dealerCode) {
  if (!dealerCode) return '';
  const code = String(dealerCode).trim();
  return ASM[code] || ASM[code.replace(/^0+/, '')] || '';
}

document.getElementById('vinInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') lookupVIN();
});

function lookupVIN() {
  const raw = document.getElementById('vinInput').value.trim().toUpperCase();
  if (!raw) { toast('Enter a VIN first.', true); return; }
  if (raw.length !== 8) { toast('Must be exactly 8 characters.', true); return; }
  const rec = KZX[raw];
  if (!rec) { toast(`"${raw}" not found in KZX Inventory.`, true); return; }

  const asmName = lookupASM(rec.soldToDealer);
  currentRec = { ...rec, asm: asmName };

  document.getElementById('f_modelYear').textContent    = rec.modelYear;
  document.getElementById('f_bodyModel').textContent    = rec.bodyModel;
  document.getElementById('f_von').textContent          = rec.von;
  document.getElementById('f_last8').textContent        = rec.last8;
  document.getElementById('f_fullVin').textContent      = rec.fullVin;
  document.getElementById('f_soldToDealer').textContent = rec.soldToDealer;

  const asmEl = document.getElementById('f_asm');
  asmEl.textContent = asmName || 'Not found';
  asmEl.className = 'val ' + (asmName ? 'asm' : 'unknown');

  document.getElementById('entryCard').classList.add('visible');
  toast(`✓ VIN ${raw} found`);
}

function submitEntry() {
  if (!currentRec) return;
  const payload = {
    date:         today(),
    modelYear:    currentRec.modelYear,
    bodyModel:    currentRec.bodyModel,
    von:          currentRec.von,
    last8:        currentRec.last8,
    fullVin:      currentRec.fullVin,
    soldToDealer: currentRec.soldToDealer,
    asm:          currentRec.asm,
  };

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  const params = new URLSearchParams(payload).toString();
  fetch(SCRIPT_URL + '?' + params, { method: 'GET', mode: 'no-cors' })
    .then(() => {
      addSessionRow(payload);
      toast('✓ Saved to Google Sheets!');
      document.getElementById('vinInput').value = '';
      document.getElementById('entryCard').classList.remove('visible');
      document.getElementById('vinInput').focus();
      currentRec = null;
    })
    .catch(() => toast('Network error — check connection.', true))
    .finally(() => { btn.disabled = false; btn.textContent = '✓ Add to Log'; });
}

function addSessionRow(d) {
  const empty = document.getElementById('emptyRow');
  if (empty) empty.remove();
  rowCount++;
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>${d.date}</td><td>${d.modelYear}</td><td>${d.bodyModel}</td>
    <td>${d.von}</td><td><strong>${d.last8}</strong></td>
    <td style="font-size:11px;font-family:monospace">${d.fullVin}</td>
    <td>${d.soldToDealer}</td><td>${d.asm||'—'}</td>
  `;
  document.getElementById('logBody').appendChild(tr);
  document.getElementById('rowCount').textContent = rowCount;
}

function toast(msg, isErr=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isErr ? ' error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), isErr ? 3500 : 2000);
}
</script>
